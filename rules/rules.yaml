version: '1.0'
location_classes:
- class_id: LC_INTERIOR_SINGLE_ROOM
  class_name: interior single room
  generation_class: interior_single_room
  description: 'INT. 开头，单一房间，无复杂连接。 例: INT. OFFICE - DAY, INT. BEDROOM - NIGHT

    '
  supports_background_panorama: false
  requires_background_panorama: false
  requires_human_review: false
- class_id: LC_INTERIOR_CONNECTED_ROOMS
  class_name: interior connected rooms
  generation_class: interior_connected_rooms
  description: 'INT. 开头，heading 含多个地点 chunk （逗号/斜杠/句点分隔）。 例: INT. LIVING ROOM / KITCHEN
    - DAY

    '
  supports_background_panorama: false
  requires_background_panorama: false
  requires_human_review: false
- class_id: LC_VEHICLE_INTERIOR
  class_name: vehicle interior
  generation_class: vehicle_interior
  description: 'INT. 开头，地点含载具关键词。 例: INT. TAXI - NIGHT, INT. SUBMARINE - DAY

    '
  supports_background_panorama: false
  requires_background_panorama: false
  requires_human_review: false
- class_id: LC_VEHICLE_ON_ROAD
  class_name: vehicle on road
  generation_class: vehicle_on_road_scene
  description: 'EXT./INT. 混合或 INT. 含背景上下文， 载具是"外部视角"而非内部。 例: EXT./INT. MIR ONE - DEEP
    OCEAN

    '
  supports_background_panorama: true
  requires_background_panorama: true
  requires_human_review: false
- class_id: LC_OUTDOOR_SMALL_AREA
  class_name: outdoor small area (<10m)
  generation_class: outdoor_small_area_under_10m
  description: 'EXT. 开头，无街道/大路/开阔自然关键词， 默认视为小区域。例: EXT. BACKYARD - DAY

    '
  supports_background_panorama: false
  requires_background_panorama: false
  requires_human_review: false
- class_id: LC_OUTDOOR_STREET
  class_name: outdoor street depth (10-20m)
  generation_class: outdoor_street_depth_10_20m
  description: 'EXT. 开头，含道路/车站关键词。 例: EXT. MAIN STREET - NIGHT

    '
  supports_background_panorama: true
  requires_background_panorama: false
  requires_human_review: false
- class_id: LC_OUTDOOR_LARGE
  class_name: outdoor large environment (20m+)
  generation_class: outdoor_large_environment
  description: 'EXT. 开头，含自然/开阔关键词 （OCEAN, DESERT, FOREST, MOUNTAIN 等）。 例: EXT. THE
    BOTTOM OF THE SEA - NIGHT

    '
  supports_background_panorama: true
  requires_background_panorama: true
  requires_human_review: false
- class_id: LC_HYBRID_OR_UNCERTAIN
  class_name: hybrid or uncertain
  generation_class: hybrid_or_uncertain
  description: EXT./INT. 混合，或无法确定的空间
  supports_background_panorama: false
  requires_background_panorama: false
  requires_human_review: true
- class_id: LC_UNKNOWN
  class_name: unknown
  generation_class: unknown
  description: 无法匹配任何规则
  supports_background_panorama: false
  requires_background_panorama: false
  requires_human_review: true
location_matchers:
- rule_id: LOC_VEHICLE_INTERIOR
  priority: 90
  int_ext: INT
  keywords_any:
  - TAXI
  - CAR
  - TRUCK
  - VAN
  - BUS
  - AMBULANCE
  - POLICE CAR
  - JEEP
  - BOAT
  - SHIP
  - SUBMARINE
