  - SUBWAY
  - ELEVATOR
  - COCKPIT
  - CABIN
  - MIR ONE
  - MIR TWO
  - MIR 1
  - MIR 2
  result_class: LC_VEHICLE_INTERIOR
  confidence: 0.86
  note: INT. + 载具关键词 → 载具内部
- rule_id: LOC_VEHICLE_ON_ROAD
  priority: 85
  int_ext: BOTH
  keywords_any:
  - TAXI
  - CAR
  - TRUCK
  - VAN
  - BUS
  - SUBMARINE
  - BOAT
  - SHIP
  - PLANE
  - HELICOPTER
  - TRAIN
  result_class: LC_VEHICLE_ON_ROAD
  confidence: 0.9
  note: EXT./INT. + 载具 → 车外视角
- rule_id: LOC_LARGE_ENVIRONMENT
  priority: 70
  int_ext: EXT
  keywords_any:
  - OCEAN
  - SEA
  - DESERT
  - FOREST
  - MOUNTAIN
  - SKY
  - HORIZON
  - VALLEY
  - BEACH
  - RIVER
  - LAKE
  - FIELD
  - MEADOW
  - JUNGLE
  - SWAMP
  - CANYON
  - CLIFF
  - BAY
  - HARBOR
  - GULF
  - PLAINS
  - TUNDRA
  - GLACIER
  - PARK
  - WOODS
  - JUNGLE
  - REEF
  - BOTTOM OF THE SEA
  result_class: LC_OUTDOOR_LARGE
  confidence: 0.82
  note: EXT. + 大自然关键词 → 开阔大型空间
- rule_id: LOC_OUTDOOR_STREET
  priority: 65
  int_ext: EXT
  keywords_any:
  - STREET
  - AVENUE
  - ROAD
  - STATION
  - BOULEVARD
  - PLAZA
  - SQUARE
  - ALLEY
  - LANE
  - DRIVE
  - HIGHWAY
  - FREEWAY
  - BRIDGE
  - CROSSWALK
  - INTERSECTION
  result_class: LC_OUTDOOR_STREET
  confidence: 0.8
  note: EXT. + 道路关键词 → 街景
- rule_id: LOC_INTERIOR_CONNECTED
  priority: 60
  int_ext: INT
  has_dot_or_slash: true
  result_class: LC_INTERIOR_CONNECTED_ROOMS
  confidence: 0.76
  note: INT. + heading 含 '.' 或 '/' → 连接房间
- rule_id: LOC_INTERIOR_SINGLE
  priority: 50
  int_ext: INT
  result_class: LC_INTERIOR_SINGLE_ROOM
  confidence: 0.82
  note: INT. 默认回退 → 单一房间
- rule_id: LOC_OUTDOOR_SMALL
  priority: 40
  int_ext: EXT
  result_class: LC_OUTDOOR_SMALL_AREA
  confidence: 0.72
  note: EXT. 默认回退 → 小区域
- rule_id: LOC_HYBRID
  priority: 30
  int_ext: BOTH
  result_class: LC_HYBRID_OR_UNCERTAIN
  confidence: 0.55
  note: EXT./INT. 混合 → 人工复核
